name: unipath
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  pdf: ^3.13.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:  
    android: true
    ios: true
    image_path: "assets/icon/app_icon.png"